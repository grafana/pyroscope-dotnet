name: Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  run-integration-test:
    name: itest ${{ matrix.flavour }} .NET ${{ matrix.dotnet_version }}
    runs-on: ubuntu-x64-large
    strategy:
      fail-fast: false
      matrix:
        dotnet_version:
          - '8.0'
          - '6.0'
        flavour:
          - glibc
          - musl
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: 'stable'
          cache-dependency-path: itest/go.sum
      - name: Run integration test
        run: make itest FLAVOUR=${{ matrix.flavour }} DOTNET_VERSION=${{ matrix.dotnet_version }}
        working-directory: itest
