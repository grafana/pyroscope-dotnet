name: Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  run-integration-test:
    name: itest ${{ matrix.flavour }} .NET ${{ matrix.dotnet_version }}
    runs-on: ubuntu-x64-large
    strategy:
      fail-fast: false
      matrix:
        dotnet_version:
          - '8.0'
          - '6.0'
        flavour:
          - glibc
          - musl
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: 'stable'
          cache-dependency-path: itest/go.sum
      - name: Run main profiler integration test
        run: make itest/main-profiler/${{ matrix.flavour }}/${{ matrix.dotnet_version }}
        working-directory: itest

  run-integration-test-notification-profiler:
    name: itest notification-profiler ${{ matrix.flavour }} .NET ${{ matrix.dotnet_version }}
    runs-on: ubuntu-x64-large
    strategy:
      fail-fast: false
      matrix:
        dotnet_version:
          - '8.0'
          - '6.0'
        flavour:
          - glibc
          - musl
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: 'stable'
          cache-dependency-path: itest/go.sum
      - name: Run notification profiler integration test
        run: make itest/notification-profiler/${{ matrix.flavour }}/${{ matrix.dotnet_version }}
        working-directory: itest

  run-integration-test-tls-profile-upload:
    name: itest tls-profile-upload ${{ matrix.flavour }} .NET 8.0
    runs-on: ubuntu-x64-large
    strategy:
      fail-fast: false
      matrix:
        flavour:
          - glibc
          - musl
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: 'stable'
          cache-dependency-path: itest/go.sum
      - name: Run TLS profile upload integration test
        run: make itest/tls-profile-upload/${{ matrix.flavour }}/8.0
        working-directory: itest
