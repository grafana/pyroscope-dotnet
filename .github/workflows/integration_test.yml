name: Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  discover:
    name: discover tests
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.tests.outputs.tests }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'
          cache-dependency-path: itest/go.sum
      - name: Generate test matrix
        id: tests
        run: echo "tests=$(make ci-matrix)" >> "$GITHUB_OUTPUT"
        working-directory: itest

  test:
    name: itest ${{ matrix.test }} ${{ matrix.libc_type }} .NET ${{ matrix.version }}
    needs: discover
    runs-on: ubuntu-x64-large
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJSON(needs.discover.outputs.tests) }}
        libc_type: [glibc, musl]
        version: ['6.0', '8.0', '9.0', '10.0']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'
          cache-dependency-path: itest/go.sum
      - name: Run integration test
        run: go test -v -timeout 60m -count=1 -run '^${{ matrix.test }}$$' ./...
        env:
          LIBC_TYPE: ${{ matrix.libc_type }}
          DOTNET_VERSION: ${{ matrix.version }}
        working-directory: itest
