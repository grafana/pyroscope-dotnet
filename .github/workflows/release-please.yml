name: Release Please

on:
  push:
    branches: [main]

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    outputs:
      pyroscope_release_created: ${{ steps.release.outputs.release_created }}
      pyroscope_version: ${{ steps.release.outputs.version }}
      pyroscope_tag_name: ${{ steps.release.outputs.tag_name }}
      pyroscope_sha: ${{ steps.release.outputs.sha }}
      opentracing_release_created: ${{ steps.release.outputs['Pyroscope/Pyroscope.OpenTracing--release_created'] }}
      opentracing_tag_name: ${{ steps.release.outputs['Pyroscope/Pyroscope.OpenTracing--tag_name'] }}
      opentracing_sha: ${{ steps.release.outputs['Pyroscope/Pyroscope.OpenTracing--sha'] }}
      opentelemetry_release_created: ${{ steps.release.outputs['Pyroscope/Pyroscope.OpenTelemetry--release_created'] }}
      opentelemetry_tag_name: ${{ steps.release.outputs['Pyroscope/Pyroscope.OpenTelemetry--tag_name'] }}
      opentelemetry_sha: ${{ steps.release.outputs['Pyroscope/Pyroscope.OpenTelemetry--sha'] }}
    steps:
      - id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@580590a644e82e79bb2598bdaba0be245a14dda0 # create-github-app-token/v0.2.2
        with:
          github_app: pyroscope-development-app
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

  build-profiler:
    permissions:
      contents: write
    needs: release-please
    if: ${{ needs.release-please.outputs.pyroscope_release_created == 'true' }}
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ github.token }}
      DOCKER_BUILDKIT: 1
      ARCH: ${{ matrix.arch }}
      LIBC: ${{ matrix.libc }}
      RELEASE_VERSION: ${{ needs.release-please.outputs.pyroscope_version }}
      TAG: ${{ needs.release-please.outputs.pyroscope_tag_name }}
    strategy:
      matrix:
        libc: ['glibc', 'musl']
        arch: ['x86_64', 'aarch64']
        include:
          - arch: x86_64
            runner: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-large' || 'ubuntu-latest' }}
          - arch: aarch64
            runner: ${{ github.repository_owner == 'grafana' && 'ubuntu-arm64-large' || 'ubuntu-24.04-arm' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release-please.outputs.pyroscope_sha }}
          submodules: 'true'
          persist-credentials: false
      - name: Build and upload profiler artifacts
        run: |
          make docker/archive
          gh release upload --clobber "$TAG" ./*.tar.gz

  build-managed-helper:
    permissions:
      contents: write
      id-token: write
    needs: release-please
    if: ${{ needs.release-please.outputs.pyroscope_release_created == 'true' }}
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ needs.release-please.outputs.pyroscope_tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release-please.outputs.pyroscope_sha }}
          persist-credentials: false
      - uses: actions/setup-dotnet@131b410979e0b49e2162c0718030257b22d6dc2c
        with:
          global-json-file: global.json
      - run: dotnet build -c Release ./Pyroscope
        working-directory: Pyroscope
      - name: Upload artifacts to draft release
        run: gh release upload --clobber "$TAG" ./Pyroscope/artifacts/bin/Pyroscope/release/Pyroscope.dll ./Pyroscope/artifacts/package/release/Pyroscope*.nupkg
      - name: Publish to nuget.org
        run: dotnet nuget push ./Pyroscope/artifacts/package/release/Pyroscope*.nupkg -s https://api.nuget.org/v3/index.json

  publish-pyroscope-release:
    permissions:
      contents: write
    needs: [release-please, build-profiler, build-managed-helper]
    if: ${{ needs.release-please.outputs.pyroscope_release_created == 'true' }}
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish GitHub release
        run: gh release edit "${{ needs.release-please.outputs.pyroscope_tag_name }}" --draft=false

  build-opentracing:
    permissions:
      contents: write
      id-token: write
    needs: release-please
    if: ${{ needs.release-please.outputs.opentracing_release_created == 'true' }}
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ needs.release-please.outputs.opentracing_tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release-please.outputs.opentracing_sha }}
          persist-credentials: false
      - uses: actions/setup-dotnet@131b410979e0b49e2162c0718030257b22d6dc2c
        with:
          global-json-file: global.json
      - run: dotnet build -c Release
        working-directory: Pyroscope/Pyroscope.OpenTracing
      - name: Upload artifacts to draft release
        run: |
          gh release upload --clobber "$TAG" \
            ./Pyroscope/artifacts/bin/Pyroscope.OpenTracing/release/Pyroscope.OpenTracing.dll \
            ./Pyroscope/artifacts/package/release/Pyroscope.OpenTracing*.nupkg
      - name: Publish to nuget.org
        run: dotnet nuget push ./Pyroscope/artifacts/package/release/Pyroscope.OpenTracing*.nupkg -s https://api.nuget.org/v3/index.json
      - name: Publish GitHub release
        run: gh release edit "$TAG" --draft=false

  build-opentelemetry:
    permissions:
      contents: write
      id-token: write
    needs: release-please
    if: ${{ needs.release-please.outputs.opentelemetry_release_created == 'true' }}
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ needs.release-please.outputs.opentelemetry_tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release-please.outputs.opentelemetry_sha }}
          persist-credentials: false
      - uses: actions/setup-dotnet@131b410979e0b49e2162c0718030257b22d6dc2c
        with:
          global-json-file: global.json
      - run: dotnet build -c Release
        working-directory: Pyroscope/Pyroscope.OpenTelemetry
      - name: Upload artifacts to draft release
        run: |
          gh release upload --clobber "$TAG" \
            ./Pyroscope/artifacts/bin/Pyroscope.OpenTelemetry/release/Pyroscope.OpenTelemetry.dll \
            ./Pyroscope/artifacts/package/release/Pyroscope.OpenTelemetry*.nupkg
      - name: Publish to nuget.org
        run: dotnet nuget push ./Pyroscope/artifacts/package/release/Pyroscope.OpenTelemetry*.nupkg -s https://api.nuget.org/v3/index.json
      - name: Publish GitHub release
        run: gh release edit "$TAG" --draft=false
