name: Release Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  docker-promote:
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    env:
      DOCKER_IMAGE: ${{ github.repository_owner == 'grafana' && 'pyroscope/pyroscope-dotnet' || 'korniltsev/pyroscope-dotnet' }}
    strategy:
      matrix:
        libc: ['glibc', 'musl']
    steps:
      - uses: grafana/shared-workflows/actions/get-vault-secrets@e7a3275d4c4978a3514801ec55708f1c599a6906
        if: github.repository_owner == 'grafana'
        with:
          repo_secrets: |
            DOCKERHUB_USERNAME=dockerhub:user
            DOCKERHUB_PASSWORD=dockerhub:token
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        name: Login to Docker Hub
        with:
          username: ${{ env.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD || secrets.DOCKERHUB_PASSWORD }}
      - name: Promote draft Docker tags
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          LIBC: ${{ matrix.libc }}
        run: |
          set -ex
          VERSION=$(echo "${TAG_NAME}" | sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+)(-pyroscope)?$/\1/')
          docker buildx imagetools create \
            --tag "${DOCKER_IMAGE}:${VERSION}-${LIBC}" \
            "${DOCKER_IMAGE}:${VERSION}-draft-${LIBC}"
      - name: Create latest manifest
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          LIBC: ${{ matrix.libc }}
        run: |
          set -ex
          VERSION=$(echo "${TAG_NAME}" | sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+)(-pyroscope)?$/\1/')
          docker buildx imagetools create \
            --tag "${DOCKER_IMAGE}:latest-${LIBC}" \
            "${DOCKER_IMAGE}:${VERSION}-draft-${LIBC}"

  nuget-publish:
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    steps:
      - uses: actions/setup-dotnet@131b410979e0b49e2162c0718030257b22d6dc2c
        with:
          dotnet-version: '8.0.x'
      - name: Download NuGet package from release
        run: gh release download "$TAG_NAME" --pattern 'Pyroscope*.nupkg' --dir ./packages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
      - uses: grafana/shared-workflows/actions/get-vault-secrets@e7a3275d4c4978a3514801ec55708f1c599a6906
        if: github.repository_owner == 'grafana'
        with:
          repo_secrets: |
            NUGET_API_KEY=nuget:api_key
      - name: Publish to nuget.org
        run: dotnet nuget push ./packages/Pyroscope*.nupkg -k "${NUGET_API_KEY}" -s https://api.nuget.org/v3/index.json
        env:
          NUGET_API_KEY: ${{ env.NUGET_API_KEY || secrets.NUGET_API_KEY }}
