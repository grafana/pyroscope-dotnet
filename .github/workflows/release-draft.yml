name: Draft Release

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  create-draft:
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event.pull_request.merged == true
          && contains(github.event.pull_request.labels.*.name, 'prepare-release'))
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    outputs:
      tag: ${{ steps.create.outputs.tag }}
      version: ${{ steps.create.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Create draft release
        id: create
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
        run: |
          set -ex
          version=$(make version)
          tag="v${version}-pyroscope"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Creating draft release ${tag} at ${TARGET_SHA}"
          gh release create "${tag}" \
            --target "${TARGET_SHA}" \
            --title "${tag}" \
            --draft \
            --generate-notes

  build-profiler-x86_64:
    needs: create-draft
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-large' || 'ubuntu-latest' }}
    env:
      DOCKER_BUILDKIT: 1
      ARCH: x86_64
      LIBC: ${{ matrix.name }}
      RELEASE_VERSION: ${{ needs.create-draft.outputs.version }}-draft
    strategy:
      matrix:
        name: ['glibc', 'musl']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          submodules: 'true'
          persist-credentials: false
      - uses: grafana/shared-workflows/actions/get-vault-secrets@e7a3275d4c4978a3514801ec55708f1c599a6906
        with:
          repo_secrets: |
            DOCKERHUB_USERNAME=dockerhub:user
            DOCKERHUB_PASSWORD=dockerhub:token
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        name: Login to Docker Hub
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}
      - run: make docker/build
      - run: make docker/push
      - run: make docker/archive
      - name: Upload artifacts to draft release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ needs.create-draft.outputs.tag }}
          files: ./*.tar.gz

  build-profiler-aarch64:
    needs: create-draft
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-arm64-large' || 'ubuntu-24.04-arm' }}
    env:
      DOCKER_BUILDKIT: 1
      ARCH: aarch64
      LIBC: ${{ matrix.name }}
      RELEASE_VERSION: ${{ needs.create-draft.outputs.version }}-draft
    strategy:
      matrix:
        name: ['glibc', 'musl']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          submodules: 'true'
          persist-credentials: false
      - uses: grafana/shared-workflows/actions/get-vault-secrets@e7a3275d4c4978a3514801ec55708f1c599a6906
        with:
          repo_secrets: |
            DOCKERHUB_USERNAME=dockerhub:user
            DOCKERHUB_PASSWORD=dockerhub:token
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        name: Login to Docker Hub
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}
      - run: make docker/build
      - run: make docker/push
      - run: make docker/archive
      - name: Upload artifacts to draft release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ needs.create-draft.outputs.tag }}
          files: ./*.tar.gz

  build-profiler-manifest:
    needs: [create-draft, build-profiler-x86_64, build-profiler-aarch64]
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    env:
      DOCKER_BUILDKIT: 1
      LIBC: ${{ matrix.name }}
      RELEASE_VERSION: ${{ needs.create-draft.outputs.version }}-draft
    strategy:
      matrix:
        name: ['glibc', 'musl']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          submodules: 'true'
          persist-credentials: false
      - uses: grafana/shared-workflows/actions/get-vault-secrets@e7a3275d4c4978a3514801ec55708f1c599a6906
        with:
          repo_secrets: |
            DOCKERHUB_USERNAME=dockerhub:user
            DOCKERHUB_PASSWORD=dockerhub:token
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        name: Login to Docker Hub
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}
      - run: make docker/manifest

  build-managed-helper:
    needs: create-draft
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          submodules: 'true'
          persist-credentials: false
      - uses: actions/setup-dotnet@131b410979e0b49e2162c0718030257b22d6dc2c
        with:
          global-json-file: global.json
      - run: dotnet build -c Release ./Pyroscope
        working-directory: Pyroscope
      - name: Upload artifacts to draft release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ needs.create-draft.outputs.tag }}
          files: |
            ./Pyroscope/artifacts/bin/Pyroscope/release/Pyroscope.dll
            ./Pyroscope/artifacts/package/release/Pyroscope*.nupkg
